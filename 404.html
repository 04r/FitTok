<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirecting…</title>
  <script>
    // Pinterest pins from this tool look like https://04r.github.io/users/<id>/profile
    // GitHub Pages serves this 404.html for those paths. Redirect to the real Roblox profile.
    (function () {
      var m = location.pathname.match(/^\/users\/(\d+)\/profile\/?$/);
      if (m) {
        location.replace('https://www.roblox.com/users/' + m[1] + '/profile');
      } else {
        location.replace('/');
      }
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=/">
</head>
<body>
  <p>Redirecting…</p>
</body>
</html>
