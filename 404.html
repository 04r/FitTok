<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirecting…</title>
  <script>
    // Catch pins that link back to our github page and bounce them to Roblox.
    // Matches paths that END with these patterns, so it works on both root
    // deploys and project-page subpath deploys (like /FitTok/):
    //   .../users/profile?username=X   (current)
    //   .../users/<id>/profile         (legacy)
    (function () {
      var path = location.pathname.replace(/\/$/, '');
      // New username-based format
      if (path.endsWith('/users/profile')) {
        var params = new URLSearchParams(location.search);
        var u = params.get('username');
        if (u) {
          location.replace('https://www.roblox.com/users/profile?username=' + encodeURIComponent(u));
          return;
        }
      }
      // Legacy id-based format
      var m = path.match(/\/users\/(\d+)\/profile$/);
      if (m) {
        location.replace('https://www.roblox.com/users/' + m[1] + '/profile');
        return;
      }
      // Anything else → back to the tool
      location.replace('/');
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=/">
</head>
<body>
  <p>Redirecting…</p>
</body>
</html>
